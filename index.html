  <!-- Core CSS Design System -->
  <style>
    :root {
      /* ── New Luxury Palette ── */
      --ivory:       #FFFDF8;
      --cream:       #FFFDF8;
      --beige:       #F5EFE6;
      --sand:        #E2D5C3;
      --taupe:       #B8A898;
      --warm-gray:   #6C7A89;
      --slate:       #6C7A89;
      --charcoal:    #243B53;
      --noir:        #1C3450;
      --gold:        #D4B483;
      --gold-light:  #E8CC99;
      --gold-dark:   #B8944A;
      --navy:        #243B53;
      --navy-light:  #3A5575;
      --navy-dark:   #1C3450;
      --champagne:   #F7EEDA;
      --sage:        #A8BBA2;
      --rose:        #C98C8C;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Poppins', 'Montserrat', sans-serif;
      background-color: var(--cream);
      color: var(--charcoal);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    h1, h2, h3, h4, h5 { font-family: 'Cormorant Garamond', 'Playfair Display', serif; }
    .font-serif  { font-family: 'Cormorant Garamond', 'Playfair Display', serif; }
    .font-display{ font-family: 'Playfair Display', 'Cormorant Garamond', serif; }
    .font-sans   { font-family: 'Poppins', 'Montserrat', sans-serif; }

    /* ── Gold gradient text ── */
    .gold-text,
    .gold-gradient {
      background: linear-gradient(135deg, #C9A55A, #E8CC99, #C9A55A, #F0D890, #B8944A);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .gold-bg  { background: linear-gradient(135deg, #C9A55A, #E8CC99, #C9A55A, #F0D890, #B8944A); }
    .gold-solid{ background-color: var(--gold); }

    /* ── Shimmer ── */
    .gold-shimmer {
      background: linear-gradient(90deg, transparent, rgba(212,180,131,0.35), transparent);
      background-size: 200% 100%;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer {
      0%   { background-position: -200% 0; }
      100% { background-position:  200% 0; }
    }

    /* ── Slow zoom hero ── */
    @keyframes slowZoom {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }
    .animate-slow-zoom { animation: slowZoom 20s ease-in-out infinite alternate; }

    /* ── Fade animations ── */
    @keyframes fadeIn  { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp  { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in   { animation: fadeIn  0.8s ease-out forwards; }
    .animate-fade-up   { animation: fadeUp  0.8s ease-out forwards; }

    /* ── Reveal up ── */
    @keyframes revealUp { from { opacity: 0; transform: translateY(60px); } to { opacity: 1; transform: translateY(0); } }
    .reveal-up { animation: revealUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* ── Slide in ── */
    @keyframes slideInLeft  { from { opacity: 0; transform: translateX(-50px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(50px);  } to { opacity: 1; transform: translateX(0); } }
    .animate-slide-in-left  { animation: slideInLeft  0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .animate-slide-in-right { animation: slideInRight 0.9s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

    /* ── Float ── */
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
    .animate-float { animation: float 6s ease-in-out infinite; }

    /* ── Marquee ── */
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }
    .animate-marquee      { animation: marquee 30s linear infinite; }
    .animate-marquee-slow { animation: marquee 50s linear infinite; }
    .animate-marquee:hover { animation-play-state: paused; }

    /* ── Glassmorphism panels ── */
    .glass-light {
      background: rgba(255, 253, 248, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 180, 131, 0.25);
    }
    .glass-navy {
      background: rgba(36, 59, 83, 0.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 180, 131, 0.2);
    }
    .glass-dark {
      background: rgba(28, 52, 80, 0.90);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 180, 131, 0.18);
    }
    .glass-panel {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(212, 180, 131, 0.15);
    }
    .glass-champagne {
      background: rgba(247, 238, 218, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 180, 131, 0.3);
    }

    /* ── Mobile menu ── */
    .mobile-menu { transform: translateX(-100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .mobile-menu.open { transform: translateX(0); }

    /* ── Dropdown ── */
    .nav-dropdown {
      opacity: 0; pointer-events: none;
      transform: translateY(-8px);
      transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .nav-dropdown-parent:hover .nav-dropdown {
      opacity: 1; pointer-events: all; transform: translateY(0);
    }

    /* ── Image zoom ── */
    .img-zoom-container { overflow: hidden; }
    .img-zoom-container img { transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
    .img-zoom-container:hover img { transform: scale(1.08); }

    /* ── Event card ── */
    .event-card { transition: transform 0.5s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s ease; }
    .event-card:hover { transform: translateY(-10px); box-shadow: 0 30px 60px rgba(36,59,83,0.18); }

    /* ── Service card ── */
    .service-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .service-card:hover { transform: translateY(-6px); box-shadow: 0 20px 60px rgba(212,180,131,0.18); }

    /* ── Blog card ── */
    .blog-card { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    .blog-card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(36,59,83,0.12); }

    /* ── Product card ── */
    .product-card { transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s ease; }
    .product-card:hover { transform: translateY(-8px); box-shadow: 0 24px 48px rgba(36,59,83,0.12); }

    /* ── Luxury line divider ── */
    .luxury-line { display: flex; align-items: center; gap: 1.5rem; }
    .luxury-line::before, .luxury-line::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* ── Process step connector ── */
    .process-step:not(:last-child)::after {
      content: ''; position: absolute;
      top: 2.5rem; left: calc(100% + 0.5rem);
      width: calc(100% - 1rem); height: 1px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    /* ── Line clamp utilities ── */
    .line-clamp-1 { display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }

    /* ── Newsletter popup ── */
    .popup-overlay { animation: fadeIn 0.3s ease-out; }
    .popup-box     { animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar       { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--beige); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--gold-dark); }

    /* ── Input focus ── */
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--gold) !important;
      box-shadow: 0 0 0 3px rgba(212, 180, 131, 0.18);
    }
    select { -webkit-appearance: none; appearance: none; }

    /* ── Badge pulse ── */
    @keyframes pulseGold {
      0%, 100% { box-shadow: 0 0 0 0 rgba(212,180,131,0.45); }
      50%       { box-shadow: 0 0 0 8px rgba(212,180,131,0);  }
    }
    .badge-pulse { animation: pulseGold 2s ease-in-out infinite; }

    /* ── Staggered animations ── */
    .stagger-1 { animation-delay: 0.1s; }
    .stagger-2 { animation-delay: 0.2s; }
    .stagger-3 { animation-delay: 0.3s; }
    .stagger-4 { animation-delay: 0.4s; }
    .stagger-5 { animation-delay: 0.5s; }
    .stagger-6 { animation-delay: 0.6s; }

    /* ── Hover underline ── */
    .hover-underline { position: relative; }
    .hover-underline::after {
      content: ''; position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.3s ease;
    }
    .hover-underline:hover::after { width: 100%; }

    /* ── Button effects ── */
    .btn-press:active { transform: scale(0.98); }
    .btn-luxury {
      position: relative;
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .btn-luxury::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 100%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .btn-luxury:hover::before { opacity: 1; }
    .btn-luxury:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212,180,131,0.35); }

    /* ── Soft glow hover ── */
    .hover-glow:hover { box-shadow: 0 0 20px rgba(212,180,131,0.3), 0 4px 20px rgba(36,59,83,0.1); }

    /* ── WhatsApp ── */
    .wa-btn { transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .wa-btn:hover { transform: scale(1.08); box-shadow: 0 8px 30px rgba(37,211,102,0.4); }

    /* ── Star rating ── */
    .star-filled { color: var(--gold); }
    .star-empty  { color: var(--sand); }

    /* ── Scroll fade ── */
    .scroll-hidden  { opacity: 0; transform: translateY(50px); transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16,1,0.3,1); }
    .scroll-visible { opacity: 1; transform: translateY(0); }

    /* ── Scrollbar hide ── */
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }

    /* ── Gallery grid ── */
    @keyframes fadeInGrid { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Back to top ── */
    .back-to-top { transition: all 0.3s cubic-bezier(0.16,1,0.3,1); }
    .back-to-top:hover { transform: translateY(-4px); }

    /* ── Duration utilities ── */
    .duration-1500 { transition-duration: 1500ms; }

    /* ── Responsive gallery ── */
    @media (max-width: 640px) {
      .gallery-grid > * { grid-column: span 1 !important; grid-row: span 1 !important; }
    }

    /* ── Smooth page transitions ── */
    main { animation: fadeIn 0.3s ease-out; }

    /* ── Logo animations ── */
    @keyframes logoEntrance {
      from { opacity: 0; transform: scale(0.88) translateY(-6px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }
    @keyframes logoShimmerSweep {
      0%   { transform: translateX(-100%) skewX(-15deg); }
      100% { transform: translateX(250%)  skewX(-15deg); }
    }
    .logo-entrance { animation: logoEntrance 0.7s cubic-bezier(0.16,1,0.3,1) both; }
    .logo-img-wrap {
      position: relative;
      display: inline-flex;
      align-items: center;
      overflow: hidden;
    }
    .logo-img-wrap::after {
      content: ''; position: absolute;
      top: 0; bottom: 0; left: -100%;
      width: 60%;
      background: linear-gradient(90deg, transparent, rgba(212,180,131,0.35), transparent);
      transform: skewX(-15deg);
      opacity: 0; transition: opacity 0.1s;
    }
    .logo-img-wrap:hover::after {
      animation: logoShimmerSweep 0.7s ease forwards;
      opacity: 1;
    }

    /* ── Section accent line ── */
    .accent-line {
      display: inline-block;
      width: 3rem; height: 2px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 2px;
    }

    /* ── Soft gradient overlays ── */
    .overlay-navy-bottom {
      background: linear-gradient(to top, rgba(28,52,80,0.92) 0%, rgba(28,52,80,0.45) 50%, rgba(28,52,80,0.1) 100%);
    }
    .overlay-navy-right {
      background: linear-gradient(to right, rgba(28,52,80,0.75) 0%, rgba(28,52,80,0.35) 60%, transparent 100%);
